# AI-Stack / AIOS — Local Development Infrastructure
#
# Services:
#   postgres  — PostgreSQL database (agent governance, records, sessions)
#   ollama    — Local LLM inference (Atlas backend)
#   phoenix   — Control-plane API server
#   mcp       — MCP tool server (runs within phoenix by default)
#   portal    — Operator portal UI
#   prometheus_scraper — Prometheus scraper for metrics

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — persistence layer (Prometheus role)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: aios
      POSTGRES_DB: aios
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference (Atlas backend)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_ORIGINS: "*"
    restart: unless-stopped
    # To pull a model: docker compose exec ollama ollama pull llama3.2

  # ---------------------------------------------------------------------------
  # Phoenix — control-plane API server
  # ---------------------------------------------------------------------------
  phoenix:
    build:
      context: .
      dockerfile: Dockerfile
      target: phoenix
    ports:
      - "3000:3000"   # API server
      - "3001:3001"   # MCP tool server
    environment:
      NODE_ENV: production
      PORT: 3000
      MCP_PORT: 3001
      DATABASE_URL: postgresql://aios:aios@postgres:5432/aios
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: llama3.2
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Portal — operator surface (served by Vite in dev, nginx in prod)
  # ---------------------------------------------------------------------------
  portal:
    build:
      context: .
      dockerfile: Dockerfile
      target: portal
    ports:
      - "5173:80"
    depends_on:
      - phoenix
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus scraper — metrics collection
  # ---------------------------------------------------------------------------
  prometheus_scraper:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - phoenix
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
